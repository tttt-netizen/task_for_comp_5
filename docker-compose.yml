services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-leads_db}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-leads_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  init:
    build: .
    command: >
      sh -c "python main.py check
      && python -m alembic upgrade head
      && python -c 'import asyncio; from shared.bootstrap import seed_reference_data; asyncio.run(seed_reference_data())'"
    env_file:
      - .env
    restart: on-failure:3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  landings:
    build: .
    command: python main.py landings
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 10

  core:
    build: .
    command: python main.py core
    env_file:
      - .env
    ports:
      - "8001:8001"
    depends_on:
      init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build: .
    command: python main.py worker
    env_file:
      - .env
    depends_on:
      init:
        condition: service_completed_successfully

volumes:
  pg_data:
